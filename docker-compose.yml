services:
  acp-cloud:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - API_KEY=${API_KEY:-}
      - PORT=3000
      - WORKSPACE=/home/agent/workspace
    volumes:
      # Agent workspace — mount your project here
      # Host path configurable via WORKSPACE_HOST env var
      - ${WORKSPACE_HOST:-./workspace}:/home/agent/workspace
    restart: unless-stopped
