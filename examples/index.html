<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACP Cloud Runtime</title>

  <!-- Syntax highlighting theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css">

  <style>
    /* Reset + full-height layout */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
    }
    acp-app { display: flex; flex-direction: column; height: 100vh; }
  </style>
</head>
<body>

  <acp-app></acp-app>

  <!-- CDN: Markdown + syntax highlighting (loaded as globals) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>

  <!-- App modules (ES module) -->
  <script type="module" src="./acp-components.js"></script>

</body>
</html>
