<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACP Cloud Runtime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f8f9fa;
    height: 100vh;
    display: flex;
    flex-direction: column;
    color: #1a1a1a;
  }

  /* ── Header ── */
  header {
    padding: 12px 24px;
    background: #fff;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: #10b981; }
  .logo-dot.busy { background: #f59e0b; animation: pulse 1.5s infinite; }
  .logo-dot.terminated { background: #ef4444; }
  .logo-dot.connecting { background: #9ca3af; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  header h1 { font-size: 15px; font-weight: 600; color: #374151; }
  #status-text { font-size: 12px; color: #9ca3af; }
  .controls { margin-left: auto; display: flex; gap: 6px; }
  .controls select, .controls button {
    font-size: 13px; padding: 6px 12px; border-radius: 8px;
    border: 1px solid #e5e7eb; background: #fff; color: #374151;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .controls select:hover, .controls button:hover { background: #f3f4f6; border-color: #d1d5db; }
  .controls button.danger { color: #ef4444; }
  .controls button.danger:hover { background: #fef2f2; border-color: #fecaca; }

  /* ── Messages ── */
  #messages {
    flex: 1; overflow-y: auto; padding: 24px 16px;
    display: flex; flex-direction: column; gap: 16px;
  }
  #messages-inner {
    max-width: 800px; width: 100%; margin: 0 auto;
    display: flex; flex-direction: column; gap: 16px;
  }

  .msg-row { display: flex; gap: 10px; }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: #fff;
  }
  .avatar.ai { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
  .avatar.user { background: linear-gradient(135deg, #3b82f6, #06b6d4); }

  .bubble {
    padding: 12px 16px; border-radius: 16px; line-height: 1.7;
    white-space: pre-wrap; word-break: break-word; font-size: 15px;
    max-width: 85%; position: relative;
  }
  .msg-row.ai .bubble {
    background: #fff; color: #1a1a1a; border: 1px solid #f0f0f0;
    border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .msg-row.user .bubble {
    background: #3b82f6; color: #fff; border-bottom-right-radius: 4px;
  }

  .thought-bubble {
    padding: 10px 14px; border-radius: 12px; font-size: 13px;
    color: #9ca3af; background: #f9fafb; border: 1px solid #f3f4f6;
    font-style: italic; max-height: 80px; overflow-y: auto;
    line-height: 1.5; max-width: 85%;
  }

  .tool-bubble {
    padding: 8px 12px; border-radius: 10px; font-size: 13px;
    color: #6b7280; background: #f9fafb; border-left: 3px solid #6366f1;
    max-width: 85%; display: flex; align-items: center; gap: 6px;
  }
  .tool-icon { font-size: 14px; }

  .system-line {
    text-align: center; font-size: 12px; color: #c0c0c0; padding: 4px 0;
  }

  .typing-indicator {
    display: inline-flex; gap: 4px; padding: 12px 16px;
    background: #fff; border-radius: 16px; border: 1px solid #f0f0f0;
    border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .typing-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #d1d5db;
    animation: typing 1.4s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,60%,100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }

  /* ── Input ── */
  #input-area {
    flex-shrink: 0; padding: 16px; background: #fff; border-top: 1px solid #eee;
  }
  #input-inner {
    max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end;
  }
  #prompt {
    flex: 1; padding: 12px 16px; border-radius: 14px; border: 1.5px solid #e5e7eb;
    background: #f9fafb; color: #1a1a1a; font-size: 15px; font-family: inherit;
    resize: none; line-height: 1.5; transition: border-color 0.15s;
    min-height: 44px; max-height: 150px;
  }
  #prompt:focus { outline: none; border-color: #6366f1; background: #fff; }
  #prompt:disabled { opacity: 0.4; }
  #send {
    width: 44px; height: 44px; border-radius: 12px; border: none;
    background: #6366f1; color: white; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; flex-shrink: 0;
  }
  #send:hover { background: #4f46e5; }
  #send:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Scrollbar */
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot connecting" id="dot"></div>
    <h1>ACP Cloud Runtime</h1>
  </div>
  <span id="status-text">connecting...</span>
  <div class="controls">
    <input id="token-input" type="password" placeholder="API Key (optional)" style="width:140px;font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #d2d2d7;background:#fff;color:#1a1a1a;">
    <select id="agent-select"></select>
    <button onclick="newSession()">+ New</button>
    <button class="danger" onclick="closeSession()">Close</button>
  </div>
</header>

<div id="messages"><div id="messages-inner"></div></div>

<div id="input-area">
  <div id="input-inner">
    <textarea id="prompt" rows="1" placeholder="Type a message..." disabled></textarea>
    <button id="send" onclick="sendPrompt()" disabled>&#x2191;</button>
  </div>
</div>

<script>
const API = location.origin;
let sessionId = null;
let currentAgentText = '';

const $inner = document.getElementById('messages-inner');
const $messages = document.getElementById('messages');
const $prompt = document.getElementById('prompt');
const $send = document.getElementById('send');
const $dot = document.getElementById('dot');
const $statusText = document.getElementById('status-text');
const $agentSelect = document.getElementById('agent-select');

$prompt.addEventListener('input', () => {
  $prompt.style.height = 'auto';
  $prompt.style.height = Math.min($prompt.scrollHeight, 150) + 'px';
});
$prompt.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); }
});

function setStatus(s, label) {
  $dot.className = 'logo-dot ' + s;
  $statusText.textContent = label || s;
  const ready = s === 'ready';
  $prompt.disabled = !ready;
  $send.disabled = !ready;
  if (ready) $prompt.focus();
}

function scrollBottom() { $messages.scrollTop = $messages.scrollHeight; }

function addSystem(text) {
  const div = document.createElement('div');
  div.className = 'system-line';
  div.textContent = text;
  $inner.appendChild(div);
  scrollBottom();
}

function addUserMsg(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="avatar user">U</div><div class="bubble">${esc(text)}</div>`;
  $inner.appendChild(row);
  scrollBottom();
}

let agentRow = null;
let agentBubble = null;
let typingEl = null;

function showTyping() {
  if (typingEl) return;
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `<div class="avatar ai">A</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  $inner.appendChild(row);
  typingEl = row;
  scrollBottom();
}

function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

function appendAgentText(text) {
  hideTyping();
  if (!agentRow) {
    agentRow = document.createElement('div');
    agentRow.className = 'msg-row ai';
    agentBubble = document.createElement('div');
    agentBubble.className = 'bubble';
    const av = document.createElement('div');
    av.className = 'avatar ai';
    av.textContent = 'A';
    agentRow.appendChild(av);
    agentRow.appendChild(agentBubble);
    $inner.appendChild(agentRow);
  }
  currentAgentText += text;
  agentBubble.textContent = currentAgentText;
  scrollBottom();
}

let thoughtEl = null;
function appendThought(text) {
  if (!thoughtEl) {
    thoughtEl = document.createElement('div');
    thoughtEl.className = 'thought-bubble';
    $inner.appendChild(thoughtEl);
  }
  thoughtEl.textContent += text;
  thoughtEl.scrollTop = thoughtEl.scrollHeight;
  scrollBottom();
}

function addTool(title, kind) {
  hideTyping();
  const div = document.createElement('div');
  div.className = 'tool-bubble';
  div.innerHTML = `<span class="tool-icon">&#x2699;</span> ${esc(title)}${kind ? ' <small>(' + esc(kind) + ')</small>' : ''}`;
  $inner.appendChild(div);
  scrollBottom();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ── API ──

let workspace = '';
let sseReader = null;  // Single SSE connection per session
let sseAbort = null;   // AbortController for SSE fetch
const $tokenInput = document.getElementById('token-input');

// Restore token from sessionStorage (not URL, not localStorage)
$tokenInput.value = sessionStorage.getItem('acp_token') || '';
$tokenInput.addEventListener('change', () => {
  const v = $tokenInput.value.trim();
  if (v) sessionStorage.setItem('acp_token', v);
  else sessionStorage.removeItem('acp_token');
  // Re-initialize with new token
  init();
});

function authHeaders(extra = {}) {
  const h = { ...extra };
  const token = $tokenInput.value.trim();
  if (token) h['Authorization'] = `Bearer ${token}`;
  return h;
}

async function loadConfig() {
  const res = await fetch(`${API}/config`, { headers: authHeaders() });
  if (res.ok) {
    const config = await res.json();
    workspace = config.workspace;
  }
  // If no auth or config fails, server uses cwd as default
}

async function loadAgents() {
  const res = await fetch(`${API}/agents`, { headers: authHeaders() });
  if (!res.ok) {
    addSystem('Failed to load agents — check API key');
    return;
  }
  const { agents } = await res.json();
  $agentSelect.innerHTML = agents.map(a => `<option value="${a}">${a}</option>`).join('');
  if (agents.includes('pi')) $agentSelect.value = 'pi';
}

function disconnectSSE() {
  if (sseAbort) { sseAbort.abort(); sseAbort = null; }
  sseReader = null;
}

function connectSSE() {
  disconnectSSE();
  sseAbort = new AbortController();

  (async () => {
    try {
      const res = await fetch(`${API}/sessions/${sessionId}/events`, {
        headers: authHeaders({ 'Accept': 'text/event-stream' }),
        signal: sseAbort.signal,
      });
      const reader = res.body.getReader();
      sseReader = reader;
      const decoder = new TextDecoder();
      let buffer = '';
      let eventType = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('event: ')) eventType = line.slice(7).trim();
          else if (line.startsWith('data: ') && eventType) {
            handleEvent(eventType, line.slice(6));
            eventType = '';
          }
        }
      }
    } catch (e) {
      if (e.name !== 'AbortError') console.error('SSE error:', e);
    }
  })();
}

function handleEvent(type, dataStr) {
  let d;
  try { d = JSON.parse(dataStr); } catch { return; }

  if (type === 'session_status_changed') {
    setStatus(d.to, d.to);
    if (d.to === 'terminated') disconnectSSE();
  } else if (type === 'run_started') {
    currentAgentText = '';
    agentRow = null;
    agentBubble = null;
    thoughtEl = null;
    showTyping();
  } else if (type === 'agent_thought_chunk') {
    appendThought(d.content?.text || '');
  } else if (type === 'agent_message_chunk') {
    appendAgentText(d.content?.text || '');
  } else if (type === 'tool_call') {
    addTool(d.title, d.kind);
    showTyping();
  } else if (type === 'run_completed') {
    hideTyping();
    if (d.stopReason !== 'end_turn') addSystem('Run ended: ' + d.stopReason);
    setStatus('ready', 'ready');
  } else if (type === 'run_error') {
    hideTyping();
    addSystem('Error: ' + d.error);
    setStatus('ready', 'ready');
  } else if (type === 'permission_request') {
    addSystem('Permission: ' + (d.toolCall?.title || '') + ' — auto-approved');
    fetch(`${API}/sessions/${sessionId}/permissions/${d.requestId}/respond`, {
      method: 'POST',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ optionId: d.options[0]?.optionId }),
    });
  }
}

async function newSession() {
  disconnectSSE();
  if (sessionId) {
    await fetch(`${API}/sessions/${sessionId}`, { method: 'DELETE', headers: authHeaders() }).catch(() => {});
  }
  sessionId = null;
  $inner.innerHTML = '';
  setStatus('connecting', 'creating session...');

  try {
    const agent = $agentSelect.value;
    const res = await fetch(`${API}/sessions`, {
      method: 'POST',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ agent, cwd: workspace }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    sessionId = data.id;
    addSystem(`${agent} session ready`);
    setStatus('ready', 'ready');
    connectSSE(); // Single SSE connection for the session lifetime
  } catch (e) {
    addSystem('Error: ' + e.message);
    setStatus('terminated', 'error');
  }
}

async function sendPrompt() {
  const text = $prompt.value.trim();
  if (!text || !sessionId) return;

  addUserMsg(text);
  $prompt.value = '';
  $prompt.style.height = 'auto';

  const res = await fetch(`${API}/sessions/${sessionId}/prompt`, {
    method: 'POST',
    headers: authHeaders({ 'Content-Type': 'application/json' }),
    body: JSON.stringify({ text }),
  });

  if (!res.ok) {
    const body = await res.json();
    addSystem('Error: ' + (body.error || 'request failed'));
  }
  // Events arrive via the session-level SSE connection (connectSSE)
}

async function closeSession() {
  if (!sessionId) return;
  disconnectSSE();
  await fetch(`${API}/sessions/${sessionId}`, { method: 'DELETE', headers: authHeaders() }).catch(() => {});
  sessionId = null;
  addSystem('Session closed.');
  setStatus('terminated', 'closed');
}

async function init() {
  disconnectSSE();
  if (sessionId) {
    await fetch(`${API}/sessions/${sessionId}`, { method: 'DELETE', headers: authHeaders() }).catch(() => {});
    sessionId = null;
  }
  $inner.innerHTML = '';
  await loadConfig();
  await loadAgents();
  if ($agentSelect.options.length > 0) {
    await newSession();
  } else {
    setStatus('terminated', 'no agents');
  }
}

init();
</script>
</body>
</html>
